name: 'Sync to Google Docs'

description: 'Sync all files from a folder to a Google Doc. Triggered on push commits or pull request merge.'

inputs:
  folder_path:
    description: 'Folder path to watch (e.g., docs/prds)'
    required: true
  google_service_account:
    description: 'Service account JSON (use secrets)'
    required: true
  google_doc_id:
    description: 'Google Doc ID to update'
    required: true
  github_token:
    description: 'GitHub token to access repository files'
    required: false
    default: ${{ github.token }}

runs:
  using: 'node20'
  main: 'dist/index.js'
